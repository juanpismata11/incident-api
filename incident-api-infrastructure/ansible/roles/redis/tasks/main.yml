- name: Crear carpeta de data
  file:
    path: /containers/redis/data
    state: directory

- name: Place Docker compose template
  template:
    src: docker-compose.yml.j2
    dest: /container/redis/docker-compose.yml

- name: Place .env template 
  template:
    src: .env.j2
    dest: /containers/redis/.env

- name: Start Container
  community.docker.docker_compose_v2:
    project_src: /container/redis
    state: present
